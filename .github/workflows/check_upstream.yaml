name: Check Upstream and Build RISC-V Runner

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force a build even if a release already exists'
        required: false
        type: boolean
        default: false
      version_override:
        description: 'Specific upstream version to build (e.g. 2.334.0). Leave empty to use latest.'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  actions: write

env:
  BUILD_WORKFLOW_NAME: Build RISC-V runner (Fixed AppHost Registration)
  UPSTREAM_REPO: actions/runner

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Determine target upstream version
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            VERSION="${{ inputs.version_override }}"
            VERSION="${VERSION#v}"
            echo "Using manual override: v$VERSION"
          else
            echo "Fetching latest release from $UPSTREAM_REPO..."
            TAG=$(gh release view --repo "$UPSTREAM_REPO" --json tagName --jq .tagName)
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "❌ Failed to fetch upstream latest release"
              exit 1
            fi
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "📦 Target upstream version: v$VERSION"

      - name: Check if release already exists in this repo
        id: release-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXPECTED_TAG="v${{ steps.upstream.outputs.version }}-riscv64-net8"
          if gh release view "$EXPECTED_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "✅ Release $EXPECTED_TAG already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Release $EXPECTED_TAG does not exist yet"
          fi

      - name: Decide whether to build
        id: decide
        run: |
          SHOULD_BUILD=false
          REASON=""
          if [ "${{ inputs.force_build }}" = "true" ]; then
            SHOULD_BUILD=true
            REASON="force_build input is true"
          elif [ "${{ steps.release-check.outputs.exists }}" = "false" ]; then
            SHOULD_BUILD=true
            REASON="no release exists for v${{ steps.upstream.outputs.version }}"
          else
            REASON="release for v${{ steps.upstream.outputs.version }} already exists"
          fi
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "🤔 Decision: should_build=$SHOULD_BUILD"
          echo "   Reason: $REASON"

      - name: Trigger build workflow
        if: steps.decide.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Dispatching '$BUILD_WORKFLOW_NAME' for v${{ steps.upstream.outputs.version }}"
          gh workflow run "$BUILD_WORKFLOW_NAME" \
            --ref  main \
            --repo "${{ github.repository }}" \
            -f version="${{ steps.upstream.outputs.version }}"
          sleep 5
          echo ""
          echo "📋 Recent runs of the build workflow:"
          gh run list \
            --workflow "$BUILD_WORKFLOW_NAME" \
            --limit 3 \
            --repo "${{ github.repository }}"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## 🔍 Upstream Version Check"
            echo ""
            echo "| Field            | Value |"
            echo "|------------------|-------|"
            echo "| Upstream target  | \`v${{ steps.upstream.outputs.version }}\` |"
            echo "| Release exists   | ${{ steps.release-check.outputs.exists }} |"
            echo "| Build triggered  | ${{ steps.decide.outputs.should_build }} |"
          } >> "$GITHUB_STEP_SUMMARY"