name: Check Upstream and Build RISC-V Runner

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force a build even if no upstream update is detected'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  # The branch that holds the RISC-V fork and is built by the sibling workflow.
  TARGET_BRANCH: main
  # Display name of the build workflow we dispatch after a successful sync.
  BUILD_WORKFLOW_NAME: Build RISC-V runner (Fixed AppHost Registration)

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    outputs:
      should_build:     ${{ steps.decide.outputs.should_build }}
      upstream_version: ${{ steps.upstream.outputs.version }}
      synced:           ${{ steps.sync.outputs.synced }}

    steps:
      - name: Checkout ${{ env.TARGET_BRANCH }}
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Fetching latest actions/runner release ==="
          LATEST=$(curl -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/actions/runner/releases/latest \
            | jq -r .tag_name)

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "âťŚ Failed to fetch upstream latest release"
            exit 1
          fi

          VERSION=${LATEST#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$LATEST"       >> "$GITHUB_OUTPUT"
          echo "đź“¦ Upstream latest: $LATEST (version: $VERSION)"

      - name: Read current branch version
        id: current
        run: |
          if [ -f src/runnerversion ]; then
            CURRENT=$(tr -d '[:space:]' < src/runnerversion)
          else
            CURRENT="unknown"
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "đź“Ś Current ${{ env.TARGET_BRANCH }} version: $CURRENT"

      - name: Check if release already exists
        id: release-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXPECTED_TAG="v${{ steps.upstream.outputs.version }}-riscv64-net8"
          if gh release view "$EXPECTED_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "âś… Release $EXPECTED_TAG already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "đź†• Release $EXPECTED_TAG does not exist yet"
          fi

      - name: Decide whether to build
        id: decide
        run: |
          SHOULD_BUILD=false
          REASON=""

          if [ "${{ inputs.force_build }}" = "true" ]; then
            SHOULD_BUILD=true
            REASON="force_build input is true"
          elif [ "${{ steps.upstream.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            SHOULD_BUILD=true
            REASON="upstream (${{ steps.upstream.outputs.version }}) differs from branch (${{ steps.current.outputs.version }})"
          elif [ "${{ steps.release-check.outputs.exists }}" = "false" ]; then
            SHOULD_BUILD=true
            REASON="no release exists for current version"
          else
            REASON="branch is up-to-date and release already exists"
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "đź¤” Decision: should_build=$SHOULD_BUILD"
          echo "   Reason: $REASON"

      - name: Sync upstream changes into ${{ env.TARGET_BRANCH }}
        id: sync
        if: steps.decide.outputs.should_build == 'true' && steps.upstream.outputs.version != steps.current.outputs.version
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "=== Adding upstream remote and fetching tag ==="
          git remote add upstream https://github.com/actions/runner.git
          git fetch upstream "refs/tags/${{ steps.upstream.outputs.tag }}:refs/tags/${{ steps.upstream.outputs.tag }}"

          echo "=== Merging upstream ${{ steps.upstream.outputs.tag }} into ${{ env.TARGET_BRANCH }} ==="
          if git merge "${{ steps.upstream.outputs.tag }}" --no-edit \
              -m "chore: sync with upstream ${{ steps.upstream.outputs.tag }}"; then
            echo "âś… Clean merge"
          else
            echo "âš ď¸Ź  Merge conflicts detected â€“ attempting auto-resolution"

            # Always keep our CI configuration as-is
            if [ -d .github/workflows ]; then
              git checkout --ours .github/workflows/ || true
              git add .github/workflows/ || true
            fi

            # Fail loudly if anything else is still unresolved
            if git ls-files -u | grep -q .; then
              echo "âťŚ Unresolved conflicts â€“ manual intervention required:"
              git ls-files -u
              git merge --abort
              exit 1
            fi

            git commit -m "chore: sync with upstream ${{ steps.upstream.outputs.tag }} (auto-resolved)"
          fi

          # -----------------------------------------------------------------
          # GITHUB_TOKEN cannot push changes under .github/workflows/ because
          # it lacks the `workflows` scope. Upstream's own CI workflows are
          # irrelevant to this fork, so reset that directory to exactly what
          # our branch had before the merge, then amend the merge commit.
          # -----------------------------------------------------------------
          echo "=== Restoring .github/workflows/ to pre-merge state ==="
          OUR_PARENT=$(git rev-parse HEAD^1)
          echo "Our pre-merge commit: $OUR_PARENT"

          rm -rf .github/workflows
          if git ls-tree "$OUR_PARENT" -- .github/workflows/ | grep -q .; then
            git checkout "$OUR_PARENT" -- .github/workflows/
          else
            git rm -rf --cached --ignore-unmatch .github/workflows/ >/dev/null 2>&1 || true
          fi

          git add -A .github/workflows/ 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
            echo "âś… Reverted upstream .github/workflows/ changes; merge commit amended"
          else
            echo "â„ąď¸Ź  Upstream made no changes under .github/workflows/"
          fi

          echo "=== Pushing synced changes ==="
          git push origin "${{ env.TARGET_BRANCH }}"
          echo "synced=true" >> "$GITHUB_OUTPUT"
          echo "âś… Pushed upstream changes to ${{ env.TARGET_BRANCH }}"

      - name: Trigger build workflow
        if: steps.decide.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "đźš€ Dispatching '${{ env.BUILD_WORKFLOW_NAME }}' on ${{ env.TARGET_BRANCH }}"

          gh workflow run "${{ env.BUILD_WORKFLOW_NAME }}" \
            --ref  "${{ env.TARGET_BRANCH }}" \
            --repo "${{ github.repository }}"

          sleep 5
          echo ""
          echo "đź“‹ Recent runs of the build workflow:"
          gh run list \
            --workflow "${{ env.BUILD_WORKFLOW_NAME }}" \
            --limit 3 \
            --repo "${{ github.repository }}"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## đź”Ť Upstream Version Check"
            echo ""
            echo "| Field            | Value |"
            echo "|------------------|-------|"
            echo "| Target branch    | \`${{ env.TARGET_BRANCH }}\` |"
            echo "| Upstream latest  | \`${{ steps.upstream.outputs.tag }}\` |"
            echo "| Branch version   | \`${{ steps.current.outputs.version }}\` |"
            echo "| Release exists   | ${{ steps.release-check.outputs.exists }} |"
            echo "| Upstream synced  | ${{ steps.sync.outputs.synced || 'no' }} |"
            echo "| Build triggered  | ${{ steps.decide.outputs.should_build }} |"
          } >> "$GITHUB_STEP_SUMMARY"